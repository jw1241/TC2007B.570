<ion-content class="ion-padding" style="--background: #f8f9ff;">

  <div class="min-h-full flex items-center justify-center py-10 px-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow border border-[#c4c6cf]/30 overflow-hidden">

      <!-- HEADER -->
      <div class="px-6 pt-6 pb-4 border-b bg-[#eff4ff]/60">

        <button
          (click)="volverLogin()"
          class="flex items-center gap-1 text-[#002046] mb-4"
        >
          <span class="material-symbols-outlined text-[18px]">arrow_back_ios</span>
          Volver
        </button>

        <h1 class="text-2xl font-bold text-[#002046]">
          Soporte Técnico
        </h1>

        <!-- ROLE TOGGLE -->
        <div class="flex gap-2 mt-4">

          <button
            type="button"
            (click)="role='padre'"
            class="flex-1 py-2 rounded-lg border text-sm font-semibold"
            [ngClass]="role === 'padre'
              ? 'bg-[#002046] text-white'
              : 'bg-white text-[#002046]'"
          >
            Padre
          </button>

          <button
            type="button"
            (click)="role='docente'"
            class="flex-1 py-2 rounded-lg border text-sm font-semibold"
            [ngClass]="role === 'docente'
              ? 'bg-[#002046] text-white'
              : 'bg-white text-[#002046]'"
          >
            Docente
          </button>

        </div>

      </div>

      <!-- FORM -->
      <div class="px-6 py-6">

        <form (ngSubmit)="enviarSoporte()" class="space-y-6">

          <!-- ===================== -->
          <!-- ROLE INPUT -->
          <!-- ===================== -->
          <div>

            <label class="block text-sm font-semibold mb-2 text-[#0b1c30]">
              {{ role === 'padre' ? 'Matrícula del Alumno' : 'ID del Docente' }}
            </label>

            <input
              [(ngModel)]="studentId"
              name="studentId"
              required
              placeholder="Ingrese el ID"
              class="w-full px-4 py-3 border rounded-lg"
            />

          </div>

          <!-- CODE -->
          <div>

            <label class="block text-sm font-semibold mb-2 text-[#0b1c30]">
              Código de Registro
            </label>

            <input
              [(ngModel)]="registrationCode"
              name="registrationCode"
              required
              placeholder="ABC123"
              class="w-full px-4 py-3 border rounded-lg"
            />

          </div>

          <!-- VALIDATION BUTTON -->
          <button
            type="button"
            (click)="role === 'padre' ? buscarAlumno() : validarDocente()"
            class="w-full py-2 rounded-lg bg-[#465f88] text-white"
          >
            Validar {{ role }}
          </button>

          <!-- INFO (PADRE) -->
          <div *ngIf="role === 'padre' && studentFound"
               class="bg-[#eff4ff] p-4 rounded-lg">

            <p class="font-semibold">Alumno:</p>
            <p>{{ studentName }}</p>

            <p class="text-sm text-gray-600">
              {{ birthDate }}
            </p>

          </div>

          <!-- SUBJECT -->
          <div>

            <label class="block text-sm font-semibold mb-2">
              Asunto
            </label>

            <select
              [(ngModel)]="subject"
              name="subject"
              required
              class="w-full px-4 py-3 border rounded-lg"
            >
              <option value="">Seleccione</option>
              <option value="Acceso a cuenta">Acceso a cuenta</option>
              <option value="Problema técnico">Problema técnico</option>
              <option value="Otro">Otro</option>
            </select>

          </div>

          <!-- DESCRIPTION -->
          <div>

            <label class="block text-sm font-semibold mb-2">
              Descripción
            </label>

            <textarea
              [(ngModel)]="issueDescription"
              name="issueDescription"
              rows="5"
              class="w-full px-4 py-3 border rounded-lg"
            ></textarea>

          </div>

          <!-- FILES -->
          <input
            type="file"
            multiple
            accept="image/*"
            (change)="onFileSelected($event)"
          />

          <!-- FILE LIST -->
          <div *ngIf="selectedFiles.length">

            <div *ngFor="let file of selectedFiles">
              📎 {{ file.name }}
            </div>

          </div>

          <!-- SUBMIT -->
          <button
            type="submit"
            [disabled]="isSubmitting"
            class="w-full py-3 rounded-lg bg-[#002046] text-white"
          >
            {{ isSubmitting ? 'Enviando...' : 'Enviar Ticket' }}
          </button>

        </form>

      </div>

    </div>

  </div>

</ion-content>
