<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Escuela Metropolitana "La Luz" - Inicio de Sesión</title>

    <link

        rel="stylesheet" />

                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",

                        "error-container": "#ffdad6",
                        "on-primary-container": "#87a0cd",

                        "on-error-container": "#93000a",

                        "on-secondary": "#ffffff",
                        "surface": "#f8f9ff",
                        "inverse-primary": "#aec7f7",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#44474e",
                        "on-background": "#0b1c30",
                        "on-secondary-fixed": "#121f00",
                        "surface-container": "#e5eeff",
                        "on-tertiary-fixed": "#271900",
                        "surface-variant": "#d3e4fe",

                    "borderRadius": {

                        "full": "9999px"

                    "spacing": {

                        "body-md": ["Manrope"],
                        "label-md": ["Manrope"],

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">
    <!-- Login Container: Glassmorphism / Modern Card Approach -->
    <div
        class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_16px_40px_-15px_rgba(0,32,70,0.08)] border border-outline-variant/30 overflow-hidden">
        <!-- Header Section -->
        <div
            class="px-8 pt-10 pb-6 flex flex-col items-center border-b border-outline-variant/20 bg-surface-container-low/50">
            <!-- Institutional Logo -->
            <div
                class="w-24 h-24 mb-4 rounded-full bg-surface shadow-sm flex items-center justify-center border border-outline-variant/20 overflow-hidden">
                <img alt="Escuela Metropolitana La Luz Logo" class="w-full h-full object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcTWCjl-iswn9qGwnguEnmCjn29P95J5eJcgVmSm-NintYMIKF7lpE0P_1gvyd1BCZFtKAtfHruKCz7klA9sXpOfpzIQRkSutztO_sgTxMl9UyK9D_8iFjX0_bTPR4LEiuqJxro6cJ_FQ7Xnk17eMfhjeTMRRjF93F_k_0tWPTsyMC4oDzq6z96jN6uCQs4Zl_f6BJ6HbyNXFj_KYMvEEJnJO1AnKrD0vb2-b_cr_62foul5WzCTEFA89lFl3dFUVL1UYdDOKA9zs" />
            </div>
            <h1 class="font-headline-md text-headline-md text-primary text-center">Escuela Metropolitana "La Luz"</h1>
            <p class="font-body-md text-body-md text-on-surface-variant text-center mt-2">Portal para Padres</p>
        </div>
        <!-- Form Section -->
        <div class="px-8 py-8">
            <form action="#" class="space-y-6" method="POST">
                <!-- Email / Registration Number Field -->
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2" for="identifier">Correo
                        Institucional o Matrícula</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline">person</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-colors placeholder-outline"
                            id="identifier" name="identifier" placeholder="ej. perez.juan@laluz.edu" required=""
                            type="text" />
                    </div>
                </div>
                <!-- Password Field -->
                <div>
                    <label class="block font-label-md text-label-md text-on-surface mb-2"
                        for="password">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline">lock</span>
                        </div>
                        <input
                            class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-colors placeholder-outline"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
                            <span
                                class="material-symbols-outlined text-outline hover:text-on-surface-variant transition-colors">visibility_off</span>
                        </div>
                    </div>
                </div>
                <!-- Actions -->
                <div class="flex items-center justify-between mt-4">
                    <div class="flex items-center">
                        <input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded"
                            id="remember-me" name="remember-me" type="checkbox" />
                        <label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                            Recordarme
                        </label>
                    </div>
                    <div class="text-sm">
                        <a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors"
                            href="#">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>
                <!-- Submit Button -->
                <div class="pt-4">
                    <button
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-surface-tint hover:shadow-[0_4px_12px_rgba(0,32,70,0.15)] hover:-translate-y-[1px] transition-all duration-200"
                        type="submit">
                        Acceso Institucional
                    </button>
                </div>
            </form>
        </div>
        <!-- Footer / Help Link -->
        <div class="px-8 py-4 bg-surface-container-low border-t border-outline-variant/20 text-center">
            <p class="font-caption text-caption text-on-surface-variant flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[16px]">help</span>
                ¿Necesita ayuda? <a class="text-primary font-medium hover:underline" href="#">Contacte a Soporte
                    Técnico</a>
            </p>
        </div>
    </div>
</body>

</html>
