<ion-content>
      <div class="bg-surface text-on-surface font-body-md min-h-screen pb-24">

    <!-- HEADER -->
    <header class="bg-surface sticky top-0 z-40 shadow-sm">
      <div class="flex items-center justify-between px-4 h-16 max-w-container-max mx-auto">

        <!-- Logo + Name -->
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full overflow-hidden bg-white shadow-sm">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcTWCjl-iswn9qGwnguEnmCjn29P95J5eJcgVmSm-NintYMIKF7lpE0P_1gvyd1BCZFtKAtfHruKCz7klA9sXpOfpzIQRkSutztO_sgTxMl9UyK9D_8iFjX0_bTPR4LEiuqJxro6cJ_FQ7Xnk17eMfhjeTMRRjF93F_k_0tWPTsyMC4oDzq6z96jN6uCQs4Zl_f6BJ6HbyNXFj_KYMvEEJnJO1AnKrD0vb2-b_cr_62foul5WzCTEFA89lFl3dFUVL1UYdDOKA9zs" alt="La Luz Logo" class="w-full h-full object-cover" />
          </div>

          <div class="flex flex-col leading-tight">
            <span class="font-bold text-primary">
              Escuela Metropolitana
            </span>
            <span class="text-sm text-on-surface-variant">
              "La Luz"
            </span>
          </div>
        </div>

      </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-container-max mx-auto px-4 py-8 flex flex-col gap-8">

      <!-- WELCOME -->
      <section class="flex flex-col gap-2">
        <h1 class="text-primary text-xl font-bold">
  Bienvenido, {{ docente?.nombre_completo || 'Docente' }}
        </h1>
        <p class="text-on-surface-variant">
          Vista general de tu actividad académica
        </p>
      </section>

      <!-- METRICS GRID -->
      <section class="grid grid-cols-1 sm:grid-cols-2 gap-4">

        <div class="bg-surface-container-lowest rounded-xl p-5">
          <p class="text-xs uppercase text-on-surface-variant">Grupos</p>
          <p class="text-2xl font-bold text-primary">
            {{ resumen.grupos }}
          </p>
        </div>

        <div class="bg-surface-container-lowest rounded-xl p-5">
          <p class="text-xs uppercase text-on-surface-variant">Materias</p>
          <p class="text-2xl font-bold text-primary">
            {{ resumen.materias }}
          </p>
        </div>

      </section>
      

      <!-- MATERIAS -->
      <section class="flex flex-col gap-3">
  <h2 class="font-bold text-primary text-lg">Materias asignadas</h2>

  <div class="space-y-3">

    <div
      *ngFor="let m of materias"
      class="bg-surface-container-lowest p-4 rounded-xl flex justify-between items-center"
    >

      <div>
        <p class="font-semibold text-primary">
          {{ m.nombre_materia }}
        </p>

        <p class="text-sm text-on-surface-variant">
          Grado {{ m.grado }} - {{ m.seccion }}
        </p>
      </div>

      <span class="material-symbols-outlined text-on-surface-variant">
        school
      </span>

    </div>

  </div>
</section>

    </main>

  <!-- BOTTOM NAVIGATION -->
<nav
  class="fixed bottom-0 left-0 right-0 bg-surface border-t border-surface-dim z-50"
>
  <div class="grid grid-cols-4 h-16 max-w-container-max mx-auto">

    <!-- Inicio -->
    <button
      routerLink="/inicio-resumen-profesor"
  routerLinkActive="text-primary"
  [routerLinkActiveOptions]="{ exact: true }"
  class="flex flex-col items-center justify-center text-on-surface-variant"
    >
      <span class="material-symbols-outlined">
        home
      </span>

      <span class="text-xs">
        Inicio
      </span>
    </button>

    <!-- Calificaciones -->
    <button
      routerLink="/captura-calificaciones"
      routerLinkActive="text-primary"
  [routerLinkActiveOptions]="{ exact: true }"
  class="flex flex-col items-center justify-center text-on-surface-variant"
    >
      <span class="material-symbols-outlined">
        grading
      </span>

      <span class="text-xs">
        Calificaciones
      </span>
    </button>

    <!-- Mensajes -->
    <button
      routerLink="/mensajes"
      routerLinkActive="text-primary"
  [routerLinkActiveOptions]="{ exact: true }"
  class="flex flex-col items-center justify-center text-on-surface-variant"
    >
      <span class="material-symbols-outlined">
        chat
      </span>

      <span class="text-xs">
        Mensajes
      </span>
    </button>

    <!-- Perfil -->
    <button
      (click)="logout()"
  class="flex flex-col items-center justify-center text-on-surface-variant"
    >
      <span class="material-symbols-outlined">
        person
      </span>

      <span class="text-xs">
        Cerrar sesión
      </span>
    </button>

  </div>
</nav>

</div>

</ion-content>
