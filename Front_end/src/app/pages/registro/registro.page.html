<ion-content class="ion-padding" style="--background: #f8f9ff;">
  <div class="min-h-full flex items-center justify-center py-10 px-4">

    <!-- CARD -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-[0_16px_40px_-15px_rgba(0,32,70,0.08)] border border-outline-variant/30 overflow-hidden">

      <!-- HEADER -->
      <div class="px-6 pt-6 pb-3 border-b border-outline-variant/20 bg-surface-dim/60">

        <!-- BACK -->
        <button
          (click)="volver()"
          class="flex items-center gap-1 text-primary font-medium mb-4 hover:text-primary transition-colors"
          style="font-family: 'Manrope', sans-serif;"
        >
          <span class="material-symbols-outlined text-[20px]">arrow_back_ios</span>
          Volver
        </button>

        <!-- STEP -->
        <div class="flex items-center justify-center mb-5">
          <div class="w-9 h-9 rounded-full bg-primary text-white flex items-center justify-center font-bold">1</div>
          <div class="w-16 h-[2px] bg-primary mx-2"></div>
          <div class="w-9 h-9 rounded-full bg-surface-variant text-outline flex items-center justify-center font-bold">2</div>
        </div>

        <!-- ROLE TOGGLE -->
        <div class="flex gap-2 mb-4">

          <button
            type="button"
            (click)="role='padre'"
            class="flex-1 py-2 rounded-lg border text-sm font-semibold transition"
            [ngClass]="role === 'padre'
              ? 'bg-primary text-white border-primary'
              : 'bg-white text-primary border-outline-variant'"
          >
            Padre
          </button>

          <button
            type="button"
            (click)="role='docente'"
            class="flex-1 py-2 rounded-lg border text-sm font-semibold transition"
            [ngClass]="role === 'docente'
              ? 'bg-primary text-white border-primary'
              : 'bg-white text-primary border-outline-variant'"
          >
            Docente
          </button>

        </div>

        <!-- TITLE -->
        <div class="text-center">
          <div class="w-20 h-20 mx-auto rounded-full bg-surface flex items-center justify-center border border-outline-variant/20 mb-3">
            <span class="material-symbols-outlined text-[42px] text-primary">account_circle</span>
          </div>

          <h1 class="text-3xl font-bold text-primary" style="font-family: 'Manrope', sans-serif;">
            Registro
          </h1>

          <p class="text-base text-on-surface-variant mt-1">
            Información de usuario
          </p>
        </div>
      </div>

      <!-- ROLE BADGE -->
      <div class="mb-2 text-center pt-4">
        <span class="text-sm font-semibold text-primary">Tipo de registro:</span>

        <span
          class="ml-2 px-3 py-1 rounded-full text-xs font-bold"
          [ngClass]="role === 'padre'
            ? 'bg-primary text-white'
            : 'bg-primary-container text-white'"
        >
          {{ role | uppercase }}
        </span>
      </div>

      <!-- FORM -->
      <div class="px-6 py-6">

        <form (ngSubmit)="continuar()" class="space-y-6">

          <!-- ===================== -->
          <!-- PADRE -->
          <!-- ===================== -->
          <div *ngIf="role === 'padre'" class="space-y-5">

            <div class="text-sm font-semibold text-primary">
              Información del estudiante
            </div>

            <div class="space-y-4">

              <!-- MATRÍCULA -->
              <div class="space-y-1">
                <label class="text-sm font-medium text-on-background">
                  Matrícula
                </label>

                <input
                  [(ngModel)]="Id"
                  name="studentId"
                  placeholder="Ej: 202400123"
                  class="w-full px-4 py-3 border border-outline-variant rounded-lg text-on-background bg-white focus:ring-1 focus:ring-[#002046] focus:border-primary outline-none"
                />
              </div>

              <!-- CÓDIGO -->
              <div class="space-y-1">
                <label class="text-sm font-medium text-on-background">
                  Código de registro
                </label>

                <input
                  [(ngModel)]="registrationCode"
                  name="registrationCode"
                  placeholder="ABC123"
                  class="w-full px-4 py-3 border border-outline-variant rounded-lg text-on-background bg-white focus:ring-1 focus:ring-[#002046] focus:border-primary outline-none"
                />
              </div>

            </div>
          </div>

          <!-- DOCENTE -->
<div *ngIf="role === 'docente'" class="space-y-5">

  <div class="text-sm font-semibold text-primary">
    Información del docente
  </div>

  <div class="space-y-4">

    <!-- IDENTIFICACIÓN DOCENTE -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-on-background">
        Identificación del docente
      </label>

      <input
        [(ngModel)]="Id"
        name="docenteId"
        placeholder="Ej: 20240045"
        class="w-full px-4 py-3 border border-outline-variant rounded-lg
               focus:ring-1 focus:ring-[#002046] focus:border-primary
               outline-none"
      />
    </div>

    <!-- CÓDIGO DE REGISTRO -->
    <div class="space-y-1">
      <label class="text-sm font-medium text-on-background">
        Código de registro
      </label>

      <input
        [(ngModel)]="registrationCode"
        name="registrationCode"
        placeholder="ABC123"
        class="w-full px-4 py-3 border border-outline-variant rounded-lg
               focus:ring-1 focus:ring-[#002046] focus:border-primary
               outline-none"
      />
    </div>

  </div>
</div>

          <!-- BUTTON -->
          <div class="pt-4">
            <button
              type="submit"
              class="w-full py-3 rounded-lg bg-primary text-white font-semibold hover:bg-primary-container transition"
              [disabled]="
                (role === 'padre' && (!Id || !registrationCode)) ||
                (role === 'docente' && (!Id || !registrationCode))
              "
            >
              Continuar
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>
</ion-content>
