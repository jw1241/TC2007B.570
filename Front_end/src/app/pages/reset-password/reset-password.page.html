<ion-content
  class="ion-padding"
  style="--background: #f8f9ff;"
>

  <div
    class="min-h-full flex items-center justify-center px-4 py-10"
  >

    <div
      class="w-full max-w-md bg-white rounded-xl p-8"
    >

      <div class="text-center mb-8">

        <h1
          class="text-3xl font-bold text-[#002046]"
        >
          Nueva contraseña
        </h1>

        <p class="text-[#44474e] mt-2">
          Ingresa tu nueva contraseña
        </p>

      </div>

      <form
        (ngSubmit)="restablecerContrasena()"
        class="space-y-6"
      >

        <!-- PASSWORD -->
<div>

  <label
    class="block mb-2 text-[#0b1c30] font-semibold"
  >
    Nueva contraseña
  </label>

  <div class="relative">

    <input
      [type]="showPassword ? 'text' : 'password'"
      [(ngModel)]="password"
      name="password"
      required
      placeholder="••••••••"
      class="w-full px-4 py-3 pr-14 border border-[#c4c6cf] rounded-lg bg-white text-black placeholder-gray-400"
    />

    <button
      type="button"
      (click)="showPassword = !showPassword"
      class="absolute top-1/2 right-4 -translate-y-1/2 text-[#74777f]"
    >

      <span class="material-symbols-outlined">

        {{
          showPassword
            ? 'visibility'
            : 'visibility_off'
        }}

      </span>

    </button>

  </div>

</div>

<!-- CONFIRM PASSWORD -->
<div>

  <label
    class="block mb-2 text-[#0b1c30] font-semibold"
  >
    Confirmar contraseña
  </label>

  <div class="relative">

    <input
      [type]="showConfirmPassword ? 'text' : 'password'"
      [(ngModel)]="confirmPassword"
      name="confirmPassword"
      required
      placeholder="••••••••"
      class="w-full px-4 py-3 pr-14 border border-[#c4c6cf] rounded-lg bg-white text-black placeholder-gray-400"
    />

    <button
      type="button"
      (click)="showConfirmPassword = !showConfirmPassword"
      class="absolute top-1/2 right-4 -translate-y-1/2 text-[#74777f]"
    >

      <span class="material-symbols-outlined">

        {{
          showConfirmPassword
            ? 'visibility'
            : 'visibility_off'
        }}

      </span>

    </button>

  </div>

</div>

        <!-- BUTTON -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full py-3 rounded-lg bg-[#002046] text-white"
        >

          {{
            isLoading
              ? 'Guardando...'
              : 'Restablecer contraseña'
          }}

        </button>

      </form>

    </div>

  </div>

</ion-content>
