<ion-content class="ion-padding" style="--background: #f8f9ff;">

  <div class="min-h-full flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md bg-white rounded-xl shadow-[0_16px_40px_-15px_rgba(0,32,70,0.08)] border border-[#c4c6cf]/30 p-8">

      <!-- Volver -->
      <div class="mb-6">
        <button
          type="button"
          (click)="volver()"
          class="flex items-center gap-1 text-[#002046] font-semibold hover:text-[#465f88] transition-colors"
          style="font-family: 'Manrope', sans-serif;"
        >
          <span class="material-symbols-outlined text-[20px]">
            arrow_back
          </span>

          Volver
        </button>
      </div>

      <!-- Key Icon -->
      <div class="flex justify-center mb-6">

        <div class="w-24 h-24 rounded-full bg-[#eff4ff] flex items-center justify-center">

          <span class="material-symbols-outlined text-[50px] text-[#002046]">
            key
          </span>

        </div>

      </div>

      <!-- Header -->
      <div class="text-center mb-8">

        <h1
          class="text-3xl font-bold text-[#002046] mb-3"
          style="font-family: 'Manrope', sans-serif;"
        >
          Nueva contraseña
        </h1>

        <p
          class="text-[#44474e] text-base leading-relaxed"
          style="font-family: 'Inter', sans-serif;"
        >
          Ingresa el código que enviamos a
          <span class="font-semibold text-[#002046]">
            {{ email }}
          </span>
        </p>

      </div>

      <!-- Form -->
      <form class="space-y-6">

        <!-- Verification Code -->
        <div>

          <label
            for="codigo"
            class="block text-sm font-bold text-[#0b1c30] mb-2"
            style="font-family: 'Poppins', sans-serif;"
          >
            Código de verificación
          </label>

          <input
            id="codigo"
            type="text"
            placeholder="Ingresa el código"
            class="block w-full px-4 py-3 border border-[#c4c6cf] rounded-lg text-[#0b1c30] bg-white focus:ring-1 focus:ring-[#002046] focus:border-[#002046] transition-colors placeholder-[#74777f]"
            style="font-family: 'Inter', sans-serif;"
          />

        </div>

        <!-- New Password -->
        <div>

          <label
            for="password"
            class="block text-sm font-bold text-[#0b1c30] mb-2"
            style="font-family: 'Montserrat', sans-serif;"
          >
            Nueva contraseña
          </label>

          <input
            id="password"
            type="password"
            placeholder="••••••••"
            class="block w-full px-4 py-3 border border-[#c4c6cf] rounded-lg text-[#0b1c30] bg-white focus:ring-1 focus:ring-[#002046] focus:border-[#002046] transition-colors placeholder-[#74777f]"
            style="font-family: 'Inter', sans-serif;"
          />

        </div>

        <!-- Confirm Password -->
        <div>

          <label
            for="confirmPassword"
            class="block text-sm font-bold text-[#0b1c30] mb-2"
            style="font-family: 'Raleway', sans-serif;"
          >
            Confirmar contraseña
          </label>

          <input
            id="confirmPassword"
            type="password"
            placeholder="••••••••"
            class="block w-full px-4 py-3 border border-[#c4c6cf] rounded-lg text-[#0b1c30] bg-white focus:ring-1 focus:ring-[#002046] focus:border-[#002046] transition-colors placeholder-[#74777f]"
            style="font-family: 'Inter', sans-serif;"
          />

        </div>

        <!-- Button -->
        <div class="pt-2">

          <button
            type="submit"
            class="w-full py-3 rounded-lg bg-[#002046] text-white font-semibold text-sm hover:bg-[#465f88] hover:shadow-[0_4px_12px_rgba(0,32,70,0.15)] transition-all duration-200"
            style="font-family: 'Manrope', sans-serif;"
          >
            Restablecer contraseña
          </button>

        </div>

      </form>

    </div>

  </div>

</ion-content>
