<ion-content [fullscreen]="true" class="bg-background">
  <div class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header class="sticky top-0 w-full z-40 flex justify-between items-center px-4 bg-surface shadow-sm h-14">
      <div class="font-headline-md text-headline-md font-bold text-primary">Escuela Metropolitana "La Luz"</div>
      <div
        class="flex items-center justify-center min-h-[44px] min-w-[44px] cursor-pointer hover:bg-surface-container-low transition-colors duration-200 active:scale-95 text-primary">
        <span class="material-symbols-outlined">settings</span>
      </div>
    </header>

    <!-- Main Content Canvas -->
    <main class="flex-grow px-4 py-6 pb-24 overflow-y-auto max-w-5xl mx-auto w-full">
      <!-- Profile Header -->
      <section class="flex flex-col items-center gap-4 mb-8">
        <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-surface-container shadow-sm">
          <img alt="Profile picture of the parent" class="w-full h-full object-cover"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD88H2OgKfVNe4CL662dXVoxuY5cHPqzhiwUTEeDQ6Ll_Cxqmg6IBxZnzFuf63NKao_54T11LoUNJhe2eFNHd3hpZAHPVkWSqVLyWHuSwia7X9_V_q528hXze7U99ZKg0xyFGwZgVUyJr7hanu-cf0ZaLOA9r-DRR3mdhTpT6w5DCX51sgOkigaXIZZSZXja9ZKk7f2KBzv16_mEIkaDJjXDhu3qr3wLlTHPE-7ta0G1M3Xy1E89yeW4-3RpiiDVtF3uCWMoHm52rk" />
        </div>
        <div class="text-center">
          <h2 class="font-headline-md text-headline-md text-on-surface">Familia García</h2>
          <p class="font-body-md text-body-md text-on-surface-variant">Padre/Tutor</p>
        </div>
      </section>

      <!-- Profile Options -->
      <section class="flex flex-col gap-4">
        <h3 class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider mb-2">Ajustes de la
          cuenta</h3>

        <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/30 flex flex-col">
          <button
            class="flex items-center justify-between p-4 border-b border-outline-variant/20 hover:bg-surface-container-low transition-colors text-left w-full">
            <div class="flex items-center gap-4">
              <span class="material-symbols-outlined text-primary">person</span>
              <span class="font-body-lg text-body-lg text-on-surface">Información Personal</span>
            </div>
            <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
          </button>
          <button
            class="flex items-center justify-between p-4 border-b border-outline-variant/20 hover:bg-surface-container-low transition-colors text-left w-full">
            <div class="flex items-center gap-4">
              <span class="material-symbols-outlined text-primary">notifications</span>
              <span class="font-body-lg text-body-lg text-on-surface">Notificaciones</span>
            </div>
            <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
          </button>
          <button
            class="flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors text-left w-full">
            <div class="flex items-center gap-4">
              <span class="material-symbols-outlined text-primary">security</span>
              <span class="font-body-lg text-body-lg text-on-surface">Privacidad y Seguridad</span>
            </div>
            <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
          </button>
        </div>

        <h3 class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider mt-4 mb-2">Soporte</h3>
        <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/30 flex flex-col">
          <button
            class="flex items-center justify-between p-4 border-b border-outline-variant/20 hover:bg-surface-container-low transition-colors text-left w-full">
            <div class="flex items-center gap-4">
              <span class="material-symbols-outlined text-primary">help</span>
              <span class="font-body-lg text-body-lg text-on-surface">Centro de Ayuda</span>
            </div>
            <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
          </button>
          <button
            (click)="logout()"
            class="flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors text-left w-full">
            <div class="flex items-center gap-4">
              <span class="material-symbols-outlined text-error">logout</span>
              <span class="font-body-lg text-body-lg text-error">Cerrar Sesión</span>
            </div>
          </button>
        </div>
      </section>
    </main>

    <!-- BottomNavBar -->
    <nav
      class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-1 bg-surface border-t border-outline-variant h-16 max-w-5xl md:left-1/2 md:-translate-x-1/2">
      <!-- Tab 1: Inicio (INACTIVE) -->
      <button (click)="navigateTo('/inicio-resumen-alumno')"
        class="flex flex-col items-center justify-center text-on-surface-variant min-h-[44px] min-w-[44px] hover:bg-surface-container-low transition-all active:scale-90 rounded-xl px-2">
        <span class="material-symbols-outlined">home</span>
        <span class="font-label-md text-label-md mt-1">Inicio</span>
      </button>
      <!-- Tab 2: Calificaciones (INACTIVE) -->
      <button (click)="navigateTo('/calificaciones-padre')"
        class="flex flex-col items-center justify-center text-on-surface-variant min-h-[44px] min-w-[44px] hover:bg-surface-container-low transition-all active:scale-90 rounded-xl px-2">
        <span class="material-symbols-outlined">grade</span>
        <span class="font-label-md text-label-md mt-1">Calificaciones</span>
      </button>
      <!-- Tab 3: Mensajes (INACTIVE) -->
      <button (click)="navigateTo('/mensajes-chat')"
        class="flex flex-col items-center justify-center text-on-surface-variant min-h-[44px] min-w-[44px] hover:bg-surface-container-low transition-all active:scale-90 rounded-xl px-2">
        <span class="material-symbols-outlined">chat</span>
        <span class="font-label-md text-label-md mt-1">Mensajes</span>
      </button>
      <!-- Tab 4: Cerrar sesión -->
      <button (click)="logout()"
        class="flex flex-col items-center justify-center text-on-surface-variant min-h-[44px] min-w-[44px] hover:bg-surface-container-low transition-all active:scale-90 rounded-xl px-2">
        <span class="material-symbols-outlined">person</span>
        <span class="font-label-md text-label-md mt-1">Cerrar sesión</span>
      </button>
    </nav>
  </div>
</ion-content>
