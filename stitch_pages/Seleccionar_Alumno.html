<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Selección de Alumno - Escuela Metropolitana "La Luz"</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#cd950d",
                        "surface-dim": "#cbdbf5",
                        "surface-container-low": "#eff4ff",
                        "tertiary-fixed-dim": "#fabc3c",
                        "on-error": "#ffffff",
                        "background": "#f8f9ff",
                        "primary-fixed": "#d6e3ff",
                        "surface-bright": "#f8f9ff",
                        "secondary": "#466800",
                        "secondary-container": "#b7f64a",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "outline": "#74777f",
                        "surface-container-high": "#dce9ff",
                        "secondary-fixed": "#b7f64a",
                        "primary-container": "#1b365d",
                        "on-secondary-container": "#4b6f00",
                        "tertiary": "#2d1e00",
                        "on-surface": "#0b1c30",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#344e00",
                        "primary": "#002046",
                        "tertiary-container": "#483200",
                        "on-primary-fixed-variant": "#2e476f",
                        "on-primary-fixed": "#001b3d",
                        "outline-variant": "#c4c6cf",
                        "on-tertiary-fixed-variant": "#5e4200",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#87a0cd",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#aec7f7",
                        "surface-tint": "#465f88",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffdea7",
                        "surface-container-highest": "#d3e4fe",
                        "inverse-surface": "#213145",
                        "on-secondary": "#ffffff",
                        "surface": "#f8f9ff",
                        "inverse-primary": "#aec7f7",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#44474e",
                        "on-background": "#0b1c30",
                        "on-secondary-fixed": "#121f00",
                        "surface-container": "#e5eeff",
                        "on-tertiary-fixed": "#271900",
                        "surface-variant": "#d3e4fe",
                        "secondary-fixed-dim": "#9cd92d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "gutter": "24px",
                        "base": "8px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "body-md": ["Manrope"],
                        "label-md": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "display-lg": ["Manrope"],
                        "caption": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
    <!-- TopAppBar -->
    <header
        class="sticky top-0 w-full z-40 flex justify-between items-center px-[16px] md:px-[40px] bg-surface shadow-sm h-14 border-b border-outline-variant/20">
        <div
            class="active:scale-95 cursor-pointer flex items-center justify-center min-h-[44px] min-w-[44px] hover:bg-surface-container-low transition-colors duration-200 rounded-full">
            <img alt="Profile picture of the parent"
                class="w-8 h-8 rounded-full border border-outline-variant/50 object-cover"
                data-alt="Close-up portrait of a friendly professional woman with a warm smile, serving as the parent's profile avatar. The lighting is soft and natural, emphasizing a trustworthy and approachable demeanor. The background is slightly blurred with light blue tones, complementing the clean, modern aesthetic of the educational app interface."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBZ_3v5Il6BGq-o1m6EslKHxsUvOxKWa6tMV2Q9vAWEQZk19AH3BV6I7aEkEs5i5qU8UXiA0HAPLuxteVV0scz-6_ViQlIrIZO6FYJPhv1NGmExwm8BkUaXwi2Du6KDhnJAGE96EJlPHvDXOJzp9lLjm8XvE_84DqoyGc5KMk4-ruLLmQJT2Mq6hJu7UQpAbfQZ2imoZrYMlgzYuzriPqe20CRkSa-qt4deJ7b-xFTKcv5Y6eQdm8g9AmPX1O7HrAhnobBnEns-rLc" />
        </div>
        <div class="font-headline-md text-headline-md font-bold text-primary">Escuela Metropolitana "La Luz"</div>
        <div
            class="active:scale-95 cursor-pointer flex items-center justify-center min-h-[44px] min-w-[44px] hover:bg-surface-container-low transition-colors duration-200 text-on-surface-variant rounded-full">
            <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
        </div>
    </header>
    <!-- Main Content Canvas -->
    <!-- Navigation shell suppressed due to linear/transactional intent (Gateway/Selection Screen) -->
    <main
        class="flex-grow flex flex-col items-center justify-center px-4 md:px-10 py-12 md:py-20 w-full max-w-container-max mx-auto">
        <!-- Header Section -->
        <div class="text-center mb-12 max-w-2xl">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-surface-container-high text-primary mb-6 shadow-sm">
                <span class="material-symbols-outlined text-[32px]" data-icon="school" data-weight="fill"
                    style="font-variation-settings: 'FILL' 1;">school</span>
            </div>
            <h1 class="font-display-lg text-display-lg text-primary mb-4">Bienvenido, Familia García</h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant">¿De quién te gustaría revisar la información
                hoy? Selecciona un perfil para continuar.</p>
        </div>
        <!-- Student Selection Bento Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-5xl">
            <!-- Student Card 1: Juan -->
            <button
                class="group relative flex flex-col bg-surface-container-lowest rounded-[24px] shadow-sm hover:shadow-md border border-outline-variant/30 hover:border-primary/40 transition-all duration-300 overflow-hidden text-left active:scale-[0.98]">
                <!-- Decorative Top Banner -->
                <div class="h-24 w-full bg-gradient-to-r from-primary-container to-surface-tint opacity-90"></div>
                <div class="px-6 pb-6 pt-0 relative flex flex-col flex-grow">
                    <!-- Avatar overlapping banner -->
                    <div
                        class="w-20 h-20 rounded-full border-4 border-surface-container-lowest bg-surface-container-low shadow-sm -mt-10 mb-4 flex-shrink-0 overflow-hidden relative z-10">
                        <img alt="Foto de Juan" class="w-full h-full object-cover"
                            data-alt="Portrait of a cheerful 10-year-old Hispanic boy in a neat school uniform consisting of a white shirt and dark navy tie. He is smiling warmly at the camera. The background is a softly blurred, bright modern classroom setting with natural daylight, conveying a positive educational environment. High resolution, professional photography style."
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaJMs2q8-rlypDJG-SdqRAFKF_An3102jUwIszZ4ThnN69YuqX3snPvm5YAWJalBnu62h5afwzkbHHRXwnwAbpERYKXtriTh7xLMCpqMr5gVJXUkRzlohpZxrBtT2Um7SJk5dyoBV9BAI_RcwHIioNbglVGNl1Shd5zje_6oa_uMp1GT5ik26lt2afbQKR4oqCDscpRteqqoAa1_1UsaTui0U31xOa_X_1L6uv8pC1uaxKFtq_q5ECXHEJSs1DBXoB9AQITSo0H04" />
                    </div>
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-1">Juan García</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]" data-icon="auto_stories">auto_stories</span>
                        5º Grado - Primaria
                    </p>
                    <!-- Status / Quick Info Chips -->
                    <div class="flex flex-wrap gap-2 mt-auto pt-4 border-t border-outline-variant/20">
                        <span
                            class="inline-flex items-center gap-1 bg-surface-container px-3 py-1.5 rounded-lg font-label-md text-label-md text-on-surface">
                            <span class="w-2 h-2 rounded-full bg-secondary"></span> Activo
                        </span>
                        <span
                            class="inline-flex items-center gap-1 bg-surface-container px-3 py-1.5 rounded-lg font-label-md text-label-md text-on-surface">
                            Grupo A
                        </span>
                    </div>
                    <!-- Hover Action Indicator -->
                    <div
                        class="absolute right-6 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all duration-300 text-primary">
                        <span class="material-symbols-outlined text-[28px]"
                            data-icon="arrow_forward">arrow_forward</span>
                    </div>
                </div>
            </button>
            <!-- Student Card 2: Ana -->
            <button
                class="group relative flex flex-col bg-surface-container-lowest rounded-[24px] shadow-sm hover:shadow-md border border-outline-variant/30 hover:border-primary/40 transition-all duration-300 overflow-hidden text-left active:scale-[0.98]">
                <!-- Decorative Top Banner -->
                <div class="h-24 w-full bg-gradient-to-r from-surface-tint to-primary-container opacity-90"></div>
                <div class="px-6 pb-6 pt-0 relative flex flex-col flex-grow">
                    <!-- Avatar overlapping banner -->
                    <div
                        class="w-20 h-20 rounded-full border-4 border-surface-container-lowest bg-surface-container-low shadow-sm -mt-10 mb-4 flex-shrink-0 overflow-hidden relative z-10">
                        <img alt="Foto de Ana" class="w-full h-full object-cover"
                            data-alt="Portrait of an attentive 14-year-old Hispanic girl in a crisp school uniform featuring a white blouse and a subtle green ribbon. She has a gentle smile and confident expression. The background is a softly out-of-focus school library with modern lighting, creating a serene and academic atmosphere. High quality, sharp focus."
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDSOwIYKUD840NQq3Mg6tZFtYVnlspuKCz9hZYUKpgpEMnkQ9cXvtm5VZFNfvVmeNsgmLs1vhBOdBn7i-bXL11I2QYVoGOVTVWP0O-6VVPGoMypWaVkqyMVeIdqFuu3QwdawnfPIDvCfF5zbZZqkxPpzULXBhHZg1RxBe6zwE_HMlNoa1FkBD3kXKhlK0pFXbjjR5yZTjbI_1Wu1yeVjsnxTU0mgE9a5TL8cQs6f-dU9cJplCVFPaGTRRZvbUyd6_2SluRePhVzIsA" />
                    </div>
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-1">Ana García</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant mb-4 flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]" data-icon="science">science</span>
                        2º Secundaria
                    </p>
                    <!-- Status / Quick Info Chips -->
                    <div class="flex flex-wrap gap-2 mt-auto pt-4 border-t border-outline-variant/20">
                        <span
                            class="inline-flex items-center gap-1 bg-surface-container px-3 py-1.5 rounded-lg font-label-md text-label-md text-on-surface">
                            <span class="w-2 h-2 rounded-full bg-secondary"></span> Activo
                        </span>
                        <span
                            class="inline-flex items-center gap-1 bg-surface-container px-3 py-1.5 rounded-lg font-label-md text-label-md text-on-surface">
                            Grupo B
                        </span>
                    </div>
                    <!-- Hover Action Indicator -->
                    <div
                        class="absolute right-6 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all duration-300 text-primary">
                        <span class="material-symbols-outlined text-[28px]"
                            data-icon="arrow_forward">arrow_forward</span>
                    </div>
                </div>
            </button>
            <!-- Add Another Student Card (Ghost / Dash style) -->
            <button
                class="group flex flex-col items-center justify-center bg-transparent border-2 border-dashed border-outline-variant rounded-[24px] hover:border-primary hover:bg-surface-container-lowest transition-all duration-300 text-center p-8 min-h-[300px] active:scale-[0.98]">
                <div
                    class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant group-hover:bg-primary-container group-hover:text-primary transition-colors mb-4">
                    <span class="material-symbols-outlined text-[32px]" data-icon="add">add</span>
                </div>
                <h3
                    class="font-headline-md text-headline-md text-on-surface-variant group-hover:text-primary transition-colors mb-2">
                    Vincular otro alumno</h3>
                <p class="font-body-md text-body-md text-on-surface-variant">Ingresa el código de vinculación provisto
                    por la institución.</p>
            </button>
        </div>
    </main>
</body>

</html>
