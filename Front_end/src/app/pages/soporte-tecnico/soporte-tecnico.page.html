<ion-content class="ion-padding" style="--background: #f8f9ff;">

  <div class="min-h-full flex items-center justify-center py-10 px-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow border border-outline-variant/30 overflow-hidden">

      <!-- HEADER -->
      <div class="px-6 pt-6 pb-4 border-b bg-surface-dim/60">

        <button
          (click)="volverLogin()"
          class="flex items-center gap-1 text-primary mb-4"
        >
          <span class="material-symbols-outlined text-[18px]">arrow_back_ios</span>
          Volver
        </button>

        <h1 class="text-2xl font-bold text-primary">
          Soporte Técnico
        </h1>

        <!-- ROLE TOGGLE -->
        <div class="flex gap-2 mt-4">

          <button
            type="button"
            (click)="role='padre'"
            class="flex-1 py-2 rounded-lg border text-sm font-semibold"
            [ngClass]="role === 'padre'
              ? 'bg-primary text-white'
              : 'bg-white text-primary'"
          >
            Padre
          </button>

          <button
            type="button"
            (click)="role='docente'"
            class="flex-1 py-2 rounded-lg border text-sm font-semibold"
            [ngClass]="role === 'docente'
              ? 'bg-primary text-white'
              : 'bg-white text-primary'"
          >
            Docente
          </button>

        </div>

      </div>

      <!-- FORM -->
      <div class="px-6 py-6">

        <form
  #supportForm="ngForm"
  (ngSubmit)="enviarSoporte()"
  class="space-y-6"
>

          <!-- ===================== -->
          <!-- ROLE INPUT -->
          <!-- ===================== -->
          <div>

            <label class="block text-sm font-semibold mb-2 text-on-background">
              {{ role === 'padre' ? 'Matrícula del Alumno' : 'ID del Docente' }}
            </label>

            <input
  [(ngModel)]="studentId"
  name="studentId"
  required
  placeholder="Ingrese el ID"
  class="w-full px-4 py-3 border rounded-lg text-black"
/>

          </div>

          <!-- DATE OF BIRTH (PADRE ONLY) -->
<div *ngIf="role === 'padre'">

  <label class="block text-sm font-semibold mb-2 text-on-background">
    Fecha de Nacimiento
  </label>

  <input
  type="date"
  [(ngModel)]="birthDate"
  name="birthDate"
  required
  class="w-full px-4 py-3 border rounded-lg text-black"
/>

</div>

          <!-- SUBJECT -->
          <div>

            <label class="block text-sm font-semibold mb-2 text-black">
              Asunto
            </label>

            <select
  [(ngModel)]="subject"
  name="subject"
  required
  class="w-full px-4 py-3 border rounded-lg text-black"
>
              <option value="">Seleccione</option>
              <option value="Acceso a cuenta">Acceso a cuenta</option>
              <option value="Problema técnico">Problema técnico</option>
              <option value="Otro">Otro</option>
            </select>

          </div>

          <!-- DESCRIPTION -->
          <div>

            <label class="block text-sm font-semibold mb-2">
              Descripción
            </label>

<textarea
  [(ngModel)]="issueDescription"
  name="issueDescription"
  required
  rows="5"
  class="w-full px-4 py-3 border rounded-lg text-black"
></textarea>

          </div>

          <!-- FILES -->
          <input
  #fileInput
  type="file"
  multiple
  accept="image/*"
  (change)="onFileSelected($event)"
  hidden
/>

<button
  type="button"
  (click)="fileInput.click()"
  class="px-4 py-2 bg-primary text-white rounded-lg"
>
  Seleccionar archivos
</button>

<div class="mt-2 text-sm text-outline">

  <span *ngIf="selectedFiles.length === 0">
    Ningún archivo seleccionado
  </span>

  <span *ngIf="selectedFiles.length > 0">
    {{ selectedFiles.length }} archivo(s) seleccionado(s)
  </span>

</div>

          <!-- FILE LIST -->
          <div
  *ngIf="selectedFiles.length"
  class="border rounded-lg p-3 max-h-48 overflow-y-auto bg-gray-50"
>

  <div class="font-semibold mb-2 text-sm">
    Archivos seleccionados ({{ selectedFiles.length }})
  </div>

<div
  *ngFor="let file of selectedFiles; let i = index"
  class="flex items-center justify-between py-2 border-b last:border-b-0"
>
  <div class="flex flex-col flex-1">

    <span class="truncate">
      📎 {{ file.name }}
    </span>

    <span class="text-xs text-outline">
      {{ (file.size / 1024).toFixed(1) }} KB
    </span>

  </div>

  <button
    type="button"
    (click)="removeFile(i)"
    class="text-red-600 ml-3"
  >
    ✕
  </button>

</div>

<div
  *ngIf="uploadedFiles.length"
  class="max-h-64 overflow-y-auto border rounded-lg"
>

  <a
  *ngFor="let file of uploadedFiles"
  [href]="file.archivo_url"
  target="_blank"
  class="block p-3 border-b hover:bg-gray-50"
>
  📄 {{ file.nombre }}
</a>

</div>

</div> 

          <!-- SUBMIT -->
          <button
            type="submit"
            [disabled]="isSubmitting || !supportForm.valid"
            class="w-full py-3 rounded-lg bg-primary text-white"
          >
            {{ isSubmitting ? 'Enviando...' : 'Enviar Ticket' }}
          </button>

        </form>

        <div *ngIf="ticketSubmitted" class="p-6 text-center">

  <h2 class="text-xl font-bold text-green-600">
    Ticket enviado exitosamente
  </h2>

  <p class="mt-2">
    Código: {{ generatedTicket }}
  </p>

</div>

      </div>

    </div>

  </div>

</ion-content>
